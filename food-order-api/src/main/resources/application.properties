spring.application.name=food-order-api

spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=localhost
spring.mail.port=1025

app.storage.path=storage

app.token.issuer=com.jdc.foodapp
app.token.access-life=10
app.token.refresh-life=30

app.admin.email=admin@example.com
app.admin.password=password
app.admin.name=Admin User

